version: "3.8"

services:
  claude:
    build: .
    container_name: claude-hardened

    # --- Capabilities ---
    # Drop ALL Linux capabilities. Claude Code doesn't need any.
    # This prevents privilege escalation via cap_net_raw, cap_sys_admin, etc.
    cap_drop:
      - ALL

    # --- Privilege escalation ---
    # Prevent processes from gaining new privileges via setuid, setgid,
    # or other mechanisms. Blocks exploits that try to escalate to root.
    security_opt:
      - no-new-privileges:true

    # --- Read-only filesystem ---
    # The root filesystem is mounted read-only. Only specific tmpfs
    # mounts are writable. This prevents persistent modifications to
    # the container image (backdoors, trojans, config tampering).
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
      - /home/claude/.npm:rw,size=128m
      - /home/claude/.config:rw,size=64m

    # --- Resource limits ---
    # Prevent runaway processes from consuming all host resources.
    # A compromised or buggy process can't OOM the host or starve
    # other containers of CPU.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 1G

    # --- Network ---
    # Isolated bridge network. Add firewall rules for outbound
    # restrictions if needed.
    networks:
      - claude-net

    # --- Environment ---
    # Pass through the API key from the host. The variable must be
    # set in the host environment — it is NOT stored in this file.
    environment:
      - ANTHROPIC_API_KEY

    # --- Volumes ---
    # Mount the project directory for Claude Code to work on.
    volumes:
      - ./project:/home/claude/project:rw

    # --- Stdin/tty for interactive use ---
    stdin_open: true
    tty: true

networks:
  claude-net:
    driver: bridge
