services:
  sandbox:
    build: .
    # -- Resource limits -------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 256
        reservations:
          memory: 256M
    # -- Security hardening ----------------------------------------------------
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    # -- Network isolation -----------------------------------------------------
    # Use 'none' to fully isolate, or define a custom network with firewall rules.
    # For testing, we use the default bridge so verify.js network tests work.
    network_mode: bridge
    # -- Working directory -----------------------------------------------------
    working_dir: /home/claude/project
